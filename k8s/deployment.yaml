apiVersion: apps/v1
kind: Deployment

metadata:
  name: employee-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employee-app

  template:
    metadata:
      labels:
        app: employee-app

    spec:
      containers:
      - name: employee-app

        image: rockhammer12/employee-app:v1

        ports:
        - containerPort: 3000

        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: employee-config
              key: environment

        livenessProbe:
          httpGet:
            path: /health
            port: 3000

          initialDelaySeconds: 10
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /health
            port: 3000

          initialDelaySeconds: 5
          periodSeconds: 5
